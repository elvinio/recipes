<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Knowledgebase</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e5e7eb;
  --text: #1a1a1a;
  --muted: #6b7280;
  --accent: #c0392b;
  --accent-light: #fef2f2;
  --sidebar-w: 240px;
  --header-h: 60px;
}

body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
}
header h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
header h1 span { color: var(--accent); }
#search {
  flex: 1; max-width: 400px;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 12px; font-size: 0.875rem;
  outline: none; background: var(--bg);
}
#search:focus { border-color: var(--accent); }
#filter-toggle {
  display: none; margin-left: auto;
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 12px;
  font-size: 0.8rem; cursor: pointer; color: var(--text);
}
#result-count { font-size: 0.8rem; color: var(--muted); white-space: nowrap; margin-left: auto; }

/* LAYOUT */
#layout {
  display: flex;
  min-height: calc(100vh - var(--header-h));
}

/* SIDEBAR */
aside {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  overflow-y: auto;
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
}
.filter-group { margin-bottom: 20px; }
.filter-group h3 {
  font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); margin-bottom: 8px;
}
.filter-group label {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.8rem; padding: 3px 0; cursor: pointer;
  color: var(--text);
}
.filter-group label:hover { color: var(--accent); }
.filter-group input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
.badge {
  margin-left: auto; font-size: 0.7rem;
  color: var(--muted); background: var(--bg);
  border-radius: 10px; padding: 1px 6px;
  border: 1px solid var(--border);
}
#clear-filters {
  width: 100%; padding: 7px; margin-bottom: 16px;
  font-size: 0.8rem; cursor: pointer;
  background: none; border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted);
}
#clear-filters:hover { border-color: var(--accent); color: var(--accent); }

/* MAIN GRID */
main {
  flex: 1;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  align-content: start;
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
  display: flex; flex-direction: column; gap: 8px;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: var(--accent); }
.card-cuisine {
  font-size: 0.65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--accent);
}
.card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
.card-meta {
  font-size: 0.75rem; color: var(--muted);
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto;
}
.tag {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px;
  font-size: 0.7rem; color: var(--muted);
}
.tag.spicy { background: #fff5f5; border-color: #fca5a5; color: #dc2626; }
.tag.time { background: #f0fdf4; border-color: #86efac; color: #15803d; }

/* EMPTY STATE */
#empty {
  grid-column: 1/-1;
  text-align: center; padding: 80px 20px;
  color: var(--muted);
}
#empty p { font-size: 1.1rem; margin-bottom: 8px; }

/* MODAL */
#modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.45);
  overflow-y: auto;
  padding: 40px 20px;
}
#modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
#modal {
  background: var(--surface);
  border-radius: 12px;
  width: 100%; max-width: 760px;
  padding: 32px;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
#modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; cursor: pointer;
  font-size: 1.4rem; color: var(--muted); line-height: 1;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
#modal-close:hover { background: var(--bg); color: var(--text); }
#modal-content { font-size: 0.9rem; line-height: 1.7; }
#modal-content h1 { font-size: 1.5rem; margin-bottom: 4px; }
#modal-content h2 { font-size: 1rem; font-weight: 700; margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
#modal-content blockquote { background: var(--accent-light); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 6px 6px 0; margin: 12px 0; font-size: 0.85rem; color: #7f1d1d; }
#modal-content ul, #modal-content ol { padding-left: 20px; }
#modal-content li { margin: 4px 0; }
#modal-content p { margin: 8px 0; }
#modal-loading { text-align: center; padding: 40px; color: var(--muted); }

/* RESPONSIVE */
@media (max-width: 1024px) {
  main { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  #filter-toggle { display: block; }
  #result-count { display: none; }
  aside {
    position: fixed; top: 0; left: -100%; z-index: 150;
    height: 100vh; width: 280px;
    transition: left 0.25s ease;
    padding-top: calc(var(--header-h) + 16px);
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
  }
  aside.open { left: 0; }
  #sidebar-backdrop {
    display: none;
    position: fixed; inset: 0; z-index: 140;
    background: rgba(0,0,0,0.35);
  }
  #sidebar-backdrop.open { display: block; }
  main { grid-template-columns: 1fr; padding: 12px; }
  #layout { display: block; }
  #modal { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>Recipe <span>KB</span></h1>
  <input type="search" id="search" placeholder="Search recipes…" autocomplete="off">
  <span id="result-count"></span>
  <button id="filter-toggle">☰ Filters</button>
</header>

<div id="layout">
  <aside id="sidebar">
    <button id="clear-filters">Clear all filters</button>
    <div id="filter-sidebar"></div>
  </aside>
  <main id="grid"></main>
</div>

<div id="sidebar-backdrop"></div>

<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <button id="modal-close" aria-label="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const FILTER_GROUPS = [
  { key: 'cuisine',         label: 'Cuisine' },
  { key: 'meal_type',       label: 'Meal Type' },
  { key: 'main_protein',    label: 'Protein' },
  { key: 'main_carb',       label: 'Carb' },
  { key: 'cooking_method',  label: 'Cooking Method' },
  { key: 'difficulty',      label: 'Difficulty' },
  { key: 'spice_level',     label: 'Spice Level' },
  { key: 'cook_time_bracket', label: 'Cook Time' },
];

let allRecipes = [];
let tagIndex = {};
let activeFilters = {}; // { key: Set<value> }
let searchQuery = '';

// ── Bootstrap ──────────────────────────────────────────────────────────────
fetch('recipes.json')
  .then(r => r.json())
  .then(data => {
    allRecipes = data.recipes;
    tagIndex   = data.tag_index;
    buildSidebar();
    renderGrid();
    handleHashChange();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div id="empty"><p>Could not load recipes.json</p></div>';
  });

// ── Sidebar ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('filter-sidebar');
  container.innerHTML = '';

  FILTER_GROUPS.forEach(({ key, label }) => {
    const values = tagIndex[key] || [];
    if (!values.length) return;

    const group = document.createElement('div');
    group.className = 'filter-group';
    group.innerHTML = `<h3>${label}</h3>`;

    values.forEach(val => {
      const count = allRecipes.filter(r => r[key] === val).length;
      const id = `chk-${key}-${val}`;
      const lbl = document.createElement('label');
      lbl.htmlFor = id;
      lbl.innerHTML = `
        <input type="checkbox" id="${id}" data-key="${key}" data-val="${val}">
        ${formatLabel(val)}
        <span class="badge">${count}</span>`;
      lbl.querySelector('input').addEventListener('change', onFilterChange);
      group.appendChild(lbl);
    });

    container.appendChild(group);
  });
}

function formatLabel(val) {
  return val.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function onFilterChange(e) {
  const { key, val } = e.target.dataset;
  if (!activeFilters[key]) activeFilters[key] = new Set();
  if (e.target.checked) activeFilters[key].add(val);
  else activeFilters[key].delete(val);
  if (activeFilters[key].size === 0) delete activeFilters[key];
  renderGrid();
}

document.getElementById('clear-filters').addEventListener('click', () => {
  activeFilters = {};
  document.querySelectorAll('#filter-sidebar input[type=checkbox]')
    .forEach(cb => cb.checked = false);
  renderGrid();
});

// ── Search ──────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderGrid();
});

// ── Filter logic: AND across groups, OR within group ───────────────────────
function getVisible() {
  return allRecipes.filter(r => {
    // search
    if (searchQuery && !r.title.toLowerCase().includes(searchQuery) &&
        !r.cuisine.includes(searchQuery)) return false;
    // filters
    for (const [key, vals] of Object.entries(activeFilters)) {
      if (vals.size && !vals.has(r[key])) return false;
    }
    return true;
  });
}

// ── Grid ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const visible = getVisible();
  const grid = document.getElementById('grid');
  document.getElementById('result-count').textContent =
    `${visible.length} of ${allRecipes.length} recipes`;

  if (!visible.length) {
    grid.innerHTML = '<div id="empty"><p>No recipes match your filters.</p><p style="font-size:0.85rem">Try clearing some filters.</p></div>';
    return;
  }

  grid.innerHTML = '';
  visible.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.file = r.file;
    card.dataset.slug = `${r.cuisine}/${r.slug}`;
    card.innerHTML = `
      <div class="card-cuisine">${r.cuisine}</div>
      <div class="card-title">${r.title}</div>
      <div class="card-meta">
        <span class="tag time">${r.cook_time_bracket} min</span>
        <span class="tag">${r.difficulty}</span>
        ${r.spice_level !== 'mild' ? `<span class="tag spicy">${r.spice_level} spice</span>` : ''}
        ${r.main_protein !== 'none' ? `<span class="tag">${r.main_protein}</span>` : ''}
      </div>`;
    card.addEventListener('click', () => {
      location.hash = card.dataset.slug;
    });
    grid.appendChild(card);
  });
}

// ── Modal / Routing ──────────────────────────────────────────────────────────
window.addEventListener('hashchange', handleHashChange);

function handleHashChange() {
  const hash = location.hash.slice(1);
  if (!hash) { closeModal(); return; }
  // find recipe by cuisine/slug
  const parts = hash.split('/');
  if (parts.length < 2) return;
  const cuisine = parts[0];
  const slug    = parts.slice(1).join('/');
  const recipe  = allRecipes.find(r => r.cuisine === cuisine && r.slug === slug);
  if (recipe) openModal(recipe);
  else closeModal();
}

function openModal(recipe) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  overlay.classList.add('open');
  content.innerHTML = '<div id="modal-loading">Loading…</div>';
  document.body.style.overflow = 'hidden';

  fetch(recipe.file)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      const body = stripFrontmatter(md);
      content.innerHTML = marked.parse(body);
    })
    .catch(err => {
      content.innerHTML = `<p style="color:#dc2626">Failed to load recipe (${err.message})</p>`;
    });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function stripFrontmatter(md) {
  if (md.startsWith('---')) {
    const end = md.indexOf('\n---', 3);
    if (end !== -1) return md.slice(end + 4).trimStart();
  }
  return md;
}

document.getElementById('modal-close').addEventListener('click', () => {
  history.pushState('', document.title, location.pathname + location.search);
  closeModal();
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) {
    history.pushState('', document.title, location.pathname + location.search);
    closeModal();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modal-overlay').classList.contains('open')) {
    history.pushState('', document.title, location.pathname + location.search);
    closeModal();
  }
});

// ── Mobile sidebar toggle ────────────────────────────────────────────────────
const sidebar   = document.getElementById('sidebar');
const backdrop  = document.getElementById('sidebar-backdrop');
const toggleBtn = document.getElementById('filter-toggle');

toggleBtn.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('open');
});
backdrop.addEventListener('click', () => {
  sidebar.classList.remove('open');
  backdrop.classList.remove('open');
});
</script>
</body>
</html>
